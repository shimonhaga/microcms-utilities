<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ngWords browser tester</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
        max-width: 720px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      textarea,
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        padding: 8px 16px;
      }
      pre {
        background: #f6f8fa;
        padding: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>NgWords tester</h1>

    <label for="ngWords">禁止語（改行 or カンマ区切り）</label>
    <textarea id="ngWords" rows="4">news,spec</textarea>

    <label for="alphabetClass">使える文字種</label>
    <input id="alphabetClass" type="text" value="[a-z0-9_-]" />

    <label for="text">テスト文字列</label>
    <input id="text" type="text" value="news" />

    <button id="runButton" type="button">判定する</button>

    <h2>結果</h2>
    <pre id="result"></pre>

    <script src="../../src/re2/ngWords.js"></script>
    <script src="./ngWords.web.js"></script>
    <script>
      const ngWordsElement = document.getElementById('ngWords');
      const textElement = document.getElementById('text');
      const alphabetClassElement = document.getElementById('alphabetClass');
      const resultElement = document.getElementById('result');
      const runButton = document.getElementById('runButton');

      function run() {
        try {
          const ngWords = window.ngWordsUtils.parseNgWords(ngWordsElement.value);
          const alphabetClass = alphabetClassElement.value || '[a-z0-9_-]';
          const pattern = window.ngWordsUtils.buildExpandedSafeRegexSource(ngWords, alphabetClass);
          const allowed = window.ngWordsUtils.isAllowed(textElement.value, ngWords, alphabetClass);

          resultElement.textContent = JSON.stringify(
            {
              ngWords,
              text: textElement.value,
              alphabetClass,
              pattern,
              allowed,
            },
            null,
            2,
          );
        } catch (error) {
          resultElement.textContent = error instanceof Error ? error.message : String(error);
        }
      }

      runButton.addEventListener('click', run);
      run();
    </script>
  </body>
</html>
