<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[RE2 用] 正規表現チェッカー</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <h1>[RE2 用] 正規表現チェッカー</h1>

    <p>このページは <code>re2js</code> を利用して判定します。</p>

    <label for="pattern">正規表現パターン</label>
    <input id="pattern" type="text" value="^news$" />

    <label for="text">テスト文字列</label>
    <input id="text" type="text" value="news" />

    <label for="flags">フラグ（任意）</label>
    <input id="flags" type="text" value="" placeholder="例: i" />

    <button id="runButton" type="button">判定する</button>

    <h2>結果</h2>
    <pre id="result"></pre>
    <script type="module">
      import { RE2JS } from 'https://cdn.jsdelivr.net/npm/re2js/+esm';

      const patternElement = document.getElementById('pattern');
      const textElement = document.getElementById('text');
      const flagsElement = document.getElementById('flags');
      const runButton = document.getElementById('runButton');
      const resultElement = document.getElementById('result');

      const re = RE2JS.compile('abc+');

      function run() {
        try {
          const pattern = patternElement.value;
          const text = textElement.value;
          const flags = flagsElement.value;
          const regexp = RE2JS.compile(pattern, flags);
          const result = regexp.matches(text);

          resultElement.textContent = JSON.stringify(result, null, 2);
        } catch (error) {
          resultElement.textContent = error instanceof Error ? error.message : String(error);
        }
      }

      runButton.addEventListener('click', run);
      run();
    </script>
  </body>
</html>
