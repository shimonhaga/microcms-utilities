<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[RE2 用] 予約語正規表現ジェネレータ</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
        max-width: 720px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      textarea,
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        padding: 8px 16px;
      }
      pre {
        background: #f6f8fa;
        padding: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>[RE2 用] 予約語正規表現ジェネレータ</h1>

    <label for="ngWords">予約語（改行 or カンマ区切り）</label>
    <textarea id="ngWords" rows="4">news,test</textarea>

    <label for="alphabetClass">使える文字種</label>
    <input id="alphabetClass" type="text" value="[a-z0-9_-]" readonly>

    <label for="text">テスト文字列</label>
    <input id="text" type="text" value="news">

    <button id="runButton" type="button">実行する</button>

    <h2>出力</h2>
    <label for="pattern">正規表現パターン</label>
    <input id="pattern" readonly>

    <h2>結果</h2>
    <pre id="result"></pre>

    <script src="../../src/re2/ngWords.js"></script>
    <script type="module">
      import { RE2JS } from "https://cdn.jsdelivr.net/npm/re2js/+esm";

      const ngWordsElement = document.getElementById('ngWords');
      const textElement = document.getElementById('text');
      const alphabetClassElement = document.getElementById('alphabetClass');
      const resultElement = document.getElementById('result');
      const patternElement = document.getElementById('pattern');
      const runButton = document.getElementById('runButton');

      function run() {
        try {
          const ngWords = [...new Set(ngWordsElement.value.split(/[\n,]/).map((word) => word.trim()).filter(Boolean))];
          const pattern = window.ngWords.buildExpandedSafeRegexSource(ngWords, alphabetClassElement.value || '[a-z0-9_-]');
          const regexp = RE2JS.compile(pattern, 'u');
          const allowed = regexp.matches(textElement.value);
          resultElement.textContent = JSON.stringify(
            {
              ngWords,
              pattern,
              alphabetClass: alphabetClassElement.value || '[a-z0-9_-]',
              text: textElement.value,
              allowed,
            },
            null,
            2,
          );
          patternElement.value = pattern;
        } catch (error) {
          resultElement.textContent = error instanceof Error ? error.message : String(error);
        }
      }

      runButton.addEventListener('click', run);
      run();
    </script>
  </body>
</html>
